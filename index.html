                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jobTitle })
            });
            const data = await res.json();
            if (data.success) {
                setBullets(data.bullets);
            }
        } catch (err) {
            console.error(err);
            // Fallback if backend is not running
            setBullets([
                `Spearheaded ${jobTitle} initiatives resulting in 40% growth.`,
                `Optimized workflows for ${jobTitle} team.`,
                `Successfully deployed full-stack solutions.`
            ]);
        }
        setLoadingAI(false);
    };

    const saveResume = async () => {
        setSaving(true);
        try {
            await fetch('http://localhost:5000/api/resumes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title: title || 'New Resume',
                    jobTitle,
                    personalInfo: { fullName, email, phone, linkedin },
                    experience: [{ company, role: jobTitle, startDate: '2024', endDate: 'Present', bullets }],
                    education: [{ degree, institution: university, year: gradYear }],
                    skills: skills.split(',').map(s => s.trim())
                })
            });
        } catch (err) {
            console.error("Backend not running", err);
        }
        setTimeout(() => {
            setSaving(false);
            setView('dashboard');
        }, 800);
    };

    return (
        <div className="min-h-screen pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto animate-fadeIn">
            <div className="flex items-center gap-4 mb-8">
                <button onClick={() => setView('dashboard')} className="text-gray-400 hover:text-white transition-colors">
                    <i className="fa-solid fa-arrow-left text-xl"></i>
                </button>
                <h1 className="text-3xl font-bold text-white">Resume Builder</h1>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                {/* Editor Panel */}
                <div className="glass-card rounded-2xl border border-dark-border p-6 space-y-6 h-[800px] overflow-y-auto custom-scrollbar">
                    {/* Basic Info */}
                    <div className="space-y-4">
                        <h3 className="text-lg font-bold text-white border-b border-dark-border pb-2">Personal Details</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">Full Name</label>
                                <input type="text" value={fullName} onChange={e => setFullName(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">Email</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">Phone</label>
                                <input type="text" value={phone} onChange={e => setPhone(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">LinkedIn Profile</label>
                                <input type="text" value={linkedin} onChange={e => setLinkedin(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                        </div>
                    </div>

                    {/* Education */}
                    <div className="space-y-4 pt-2">
                        <h3 className="text-lg font-bold text-white border-b border-dark-border pb-2">Education</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="col-span-2">
                                <label className="block text-xs font-medium text-gray-400 mb-1">Degree</label>
                                <input type="text" value={degree} onChange={e => setDegree(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">University/College</label>
                                <input type="text" value={university} onChange={e => setUniversity(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">Graduation Year</label>
                                <input type="text" value={gradYear} onChange={e => setGradYear(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                            </div>
                        </div>
                    </div>

                    {/* Skills */}
                    <div className="space-y-4 pt-2">
                        <h3 className="text-lg font-bold text-white border-b border-dark-border pb-2">Skills</h3>
                        <div>
                            <label className="block text-xs font-medium text-gray-400 mb-1">Comma Separated Skills</label>
                            <input type="text" value={skills} onChange={e => setSkills(e.target.value)} className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                        </div>
                    </div>

                    {/* Experience & AI */}
                    <div className="space-y-4 pt-2">
                        <h3 className="text-lg font-bold text-white border-b border-dark-border pb-2">Experience & AI Generator</h3>
                        <div>
                            <label className="block text-xs font-medium text-gray-400 mb-1">Company Name</label>
                            <input type="text" value={company} onChange={e => setCompany(e.target.value)} placeholder="e.g. Google" className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 mb-3" />
                            
                            <label className="block text-xs font-medium text-gray-400 mb-1">Target Job Role <span className="text-brand-500">*</span></label>
                            <div className="flex gap-2">
                                <input type="text" value={jobTitle} onChange={e => setJobTitle(e.target.value)} placeholder="e.g. Frontend Developer" className="flex-1 bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500" />
                                <Button primary onClick={generateAI} disabled={loadingAI} className="py-2 px-4 text-sm">
                                    {loadingAI ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>} 
                                    AI Write
                                </Button>
                            </div>
                        </div>

                        {bullets.length > 0 && (
                            <div className="space-y-2 mt-4">
                                <h4 className="text-xs font-bold text-gray-400">AI Generated Bullets:</h4>
                                {bullets.map((b, i) => (
                                    <div key={i} className="p-2 bg-brand-500/10 border border-brand-500/30 rounded-lg text-xs text-gray-300">
                                        • {b}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    
                    <div className="pt-6 pb-4">
                        <label className="block text-xs font-medium text-gray-400 mb-2">Save Resume As (Internal Title)</label>
                        <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Tech App 2026" className="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 mb-4" />
                        
                        <Button primary className="w-full py-3" onClick={saveResume}>
                            {saving ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-save"></i>} 
                            {saving ? 'Saving...' : 'Save to Dashboard'}
                        </Button>
                    </div>
                </div>

                {/* Live Preview Panel */}
                <div className="glass-card rounded-2xl border border-dark-border p-8 bg-white text-black h-[800px] overflow-y-auto shadow-2xl">
                    <div className="text-center mb-6 border-b pb-4">
                        <h1 className="text-3xl font-serif font-bold text-gray-900">{fullName || 'Your Name'}</h1>
                        <p className="text-gray-600 mt-1">{jobTitle || 'Professional Title'}</p>
                        <div className="text-xs text-gray-500 flex justify-center gap-4 mt-2">
                            {email && <span><i className="fa-solid fa-envelope"></i> {email}</span>}
                            {phone && <span><i className="fa-solid fa-phone"></i> {phone}</span>}
                            {linkedin && <span><i className="fa-brands fa-linkedin"></i> {linkedin}</span>}
                        </div>
                    </div>
                    
                    <div className="mb-6">
                        <h3 className="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-300 pb-1 mb-3">Experience</h3>
                        <div className="mb-4">
                            <div className="flex justify-between items-baseline mb-1">
                                <h4 className="font-bold text-gray-900">{company || 'Company Name'}</h4>
                                <span className="text-xs text-gray-500">2024 - Present</span>
                            </div>
                            <div className="italic text-sm text-gray-700 mb-2">{jobTitle || 'Role'}</div>
                            <ul className="list-disc pl-5 text-sm text-gray-600 space-y-1">
                                {bullets.length > 0 ? bullets.map((b, i) => <li key={i}>{b}</li>) : <li>Your AI generated bullet points will appear here.</li>}
                            </ul>
                        </div>
                    </div>
                    
                    <div className="mb-6">
                        <h3 className="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-300 pb-1 mb-3">Education</h3>
                        <div className="flex justify-between items-baseline mb-1">
                            <h4 className="font-bold text-gray-900">{degree || 'Degree'}</h4>
                            <span className="text-xs text-gray-500">{gradYear || 'Year'}</span>
                        </div>
                        <div className="text-sm text-gray-600">{university || 'University Name'}</div>
                    </div>

                    <div>
                        <h3 className="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-300 pb-1 mb-3">Skills</h3>
                        <p className="text-sm text-gray-600">{skills || 'Add your skills here'}</p>
                    </div>
                </div>
            </div>
        </div>
    );
};

const App = () => {
    const [view, setView] = useState('landing'); // 'landing', 'dashboard', 'builder'

    return (
        <div className="min-h-screen bg-black">
            <Navbar setView={setView} currentView={view} />
            {view === 'landing' && <LandingPage setView={setView} />}
            {view === 'dashboard' && <Dashboard setView={setView} />}
            {view === 'builder' && <ResumeBuilder setView={setView} />}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
